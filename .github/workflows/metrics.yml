name: Metrics
on:
  # Se actualiza solo todos los días a las 00:00 (hora UY) y se puede correr a mano
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 1) Tarjeta principal: cabecera + calendario isométrico (año completo)
      - name: Metrics — base + calendario
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lcorbo121
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Montevideo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2) Líneas de código modificadas
      - name: Metrics — líneas de código
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lcorbo121
          filename: metrics.lines.svg
          base: ""
          config_timezone: America/Montevideo
          plugin_lines: yes
